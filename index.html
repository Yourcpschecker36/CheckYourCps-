<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Your CPS Checker - Global Click Speed Test</title><meta name="description" content="Test your clicking speed with Your CPS Checker. Improve your CPS score and track your progress.">
<meta name="keywords" content="CPS Counter, CPS Test, Click Speed Test, Clicks Per Second, Your CPS Checker">
<meta name="author" content="Your CPS Checker"><meta property="og:title" content="Your CPS Checker">
<meta property="og:description" content="Test your clicking speed and improve your CPS.">
<meta property="og:type" content="website"><link rel="stylesheet" href="style.css"></head><body><div class="background"></div><header><h1>⚡ Your CPS Checker</h1>

<p>
    Test your clicking speed and dominate the leaderboard.
</p>

</header><div class="container"><div class="username-box">

    <input
        type="text"
        id="username"
        placeholder="Enter Username"
    >

</div>

<div class="timer-buttons">

    <button onclick="setTime(1)">1s</button>
    <button onclick="setTime(5)">5s</button>
    <button onclick="setTime(10)">10s</button>
    <button onclick="setTime(30)">30s</button>
    <button onclick="setTime(60)">60s</button>

</div>

<div id="clickArea">

    CLICK TO START

</div>

<div class="stats">

    <div class="card">

        <h3>Clicks</h3>

        <span id="clicks">0</span>

    </div>

    <div class="card">

        <h3>CPS</h3>

        <span id="cps">0.00</span>

    </div>

    <div class="card">

        <h3>Best</h3>

        <span id="best">0.00</span>

    </div>

</div>

<button
    class="submit-btn"
    onclick="submitScore()"
>
    Submit Score
</button>

<div class="leaderboards">

    <div class="leaderboard">

        <h2>🌍 Global Ranking</h2>

        <ul id="globalBoard">

            <li>Coming Soon</li>

        </ul>

    </div>

    <div class="leaderboard">

        <h2>🇮🇳 India Ranking</h2>

        <ul id="indiaBoard">

            <li>Coming Soon</li>

        </ul>

    </div>

</div>

</div><div id="resultModal" class="modal"><div class="modal-box">

    <h2>🏆 Test Finished</h2>

    <p>
        Clicks:
        <span id="finalClicks">0</span>
    </p>

    <p>
        CPS:
        <span id="finalCps">0.00</span>
    </p>

    <button id="closeModal">
        OK
    </button>

</div>

</div><footer>© 2026 Your CPS Checker

</footer><script src="script.js"></script></body>
</html>
